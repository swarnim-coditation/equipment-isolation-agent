info:
  name: create P3 viewer run
  type: http
  seq: 4

http:
  method: POST
  url: "{{BASE_URL}}/isolation-runs"
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "equipment_tag": "P3",
        "cnvrt_project_id": "{{CNVRT_PROJECT_ID}}",
        "collection_id": "{{COLLECTION_ID}}",
        "unigraph_project_id": "{{UNIGRAPH_PROJECT_ID}}",
        "collection_name": "{{COLLECTION_NAME}}",
        "include_viewer": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
